# See https://pre-commit.com
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Use project venv via uv — mirrors-mypy builds a separate env and reinstalls
  # stubs + FastAPI stack on every hook bootstrap, which is very slow.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (uv)
        entry: uv run mypy --explicit-package-bases app alembic
        language: system
        types: [python]
        pass_filenames: false
        files: ^(app/.*\\.py|main\\.py|frontend/app\\.py)$
